services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insurtech
      POSTGRES_PASSWORD: insurtech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql

